# Declares which modules' auth policies go into the signed edge-policy bundle
# and where each module's OpenAPI contract lives. CI generates one auth-policy
# document per module from these specs (via the commons OpenApiAuthPreprocessor),
# assembles them into a bundle, cosign-signs it, and pushes it to the OCI
# registry. The ACS then loads THIS bundle by digest — it never pulls policy from
# a running module pod (RFC-05 F2 closed).
#
# basePath must match the module's gateway prefix + /api/v1 (the same value the
# module Service annotates as labs64.io/auth-policy-base-path).
modules:
  - name: auditflow
    basePath: /auditflow/api/v1
    openapi: ../../labs64.io-auditflow/auditflow-api/src/main/resources/openapi/openapi-audit-v1.yaml
  - name: payment-gateway
    basePath: /payment-gateway/api/v1
    openapi: ../../labs64.io-payment-gateway/payment-gateway-be/src/main/resources/openapi/openapi-payment-gateway-v1.yaml
  - name: checkout
    basePath: /checkout/api/v1
    openapi: ../../labs64.io-checkout/checkout-be/src/main/resources/openapi/openapi-checkout-v1.yaml
