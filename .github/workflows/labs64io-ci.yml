name: Labs64.IO - API Gateway - CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

concurrency:
  group: gateway-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    uses: Labs64/labs64.io-workspace/.github/workflows/python-ci.yml@master
    with:
      working-directory: traefik-authproxy
      install-command: pip install -r requirements.txt pytest
      test-command: pytest -v
      docker-context: traefik-authproxy
      cache-dependency-path: traefik-authproxy/requirements.txt

  edge-image:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    uses: Labs64/labs64.io-workspace/.github/workflows/docker-publish.yml@master
    with:
      image: labs64/traefik-authproxy
      context: ./traefik-authproxy
      mode: edge
    secrets: inherit
