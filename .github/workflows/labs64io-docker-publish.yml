name: Labs64.IO - API Gateway - Publish Docker

on:
  release:
    types: [created]

permissions:
  contents: read

jobs:
  publish:
    uses: Labs64/labs64.io-workspace/.github/workflows/docker-publish.yml@master
    with:
      image: labs64/traefik-authproxy
      context: ./traefik-authproxy
      mode: release
      version: ${{ github.event.release.tag_name }}
    secrets: inherit
